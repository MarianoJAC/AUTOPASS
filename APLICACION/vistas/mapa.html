<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOPASS - MAPA INTERACTIVO</title>
    <link rel="stylesheet" href="../estilos/mapa.css">
</head>
<body>

    <script>
        // SEGURIDAD SIMPLIFICADA PARA PROTOTIPO
        if (!localStorage.getItem('usuario_simulado')) {
            window.location.href = '../login.html';
        }

        function logout() {
            localStorage.removeItem('usuario_simulado');
            window.location.href = '../login.html';
        }
    </script>

    <header class="HeaderMapa">
        <img src="../recursos/LOGOSINFONDO2-removebg-preview.png" alt="LOGO" class="LogoHeader">
        <div id="welcomeMsg" class="TituloHeader">CARGANDO...</div>
        <button onclick="logout()" class="BtnSalir">SALIR</button>
    </header>

    <div class="ContenedorMapa">
        <iframe 
            src="https://maps.google.com/maps?q=Moron+Park@-34.6510007,-58.6227073&z=17&output=embed" 
            allowfullscreen="" 
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>

        <a href="reservas.html" class="BotonReserva">HACER UNA RESERVA</a>
    </div>

    <script>
        // PERSONALIZAR SALUDO
        const usuario = localStorage.getItem('usuario_simulado');
        if (usuario) {
            document.getElementById('welcomeMsg').innerText = `HOLA, ${usuario.split('@')[0].toUpperCase()}`;
        } else {
            document.getElementById('welcomeMsg').innerText = `MAPA INTERACTIVO`;
        }
    </script>

</body>
</html>
