<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOPASS - REGISTRO</title>
    <link rel="stylesheet" href="../estilos/registro.css">
</head>
<body>

    <img src="../recursos/LOGOSINFONDO2-removebg-preview.png" alt="LOGO" class="LogoRegistro">

    <div class="ContenedorFormulario">
        <h2 class="TituloRegistro">REGISTRO DE USUARIO</h2>
        
        <form id="formRegistro" class="FormularioLogin">
            <div class="FilaInputs">
                <div class="GrupoInput">
                    <span class="EtiquetaInput">NOMBRE</span>
                    <input type="text" id="nombre" placeholder="NOMBRE" required>
                </div>
                <div class="GrupoInput">
                    <span class="EtiquetaInput">APELLIDO</span>
                    <input type="text" id="apellido" placeholder="APELLIDO" required>
                </div>
            </div>

            <div class="FilaInputs">
                <div class="GrupoInput">
                    <span class="EtiquetaInput">DNI</span>
                    <input type="text" id="dni" placeholder="DNI" required>
                </div>
                <div class="GrupoInput">
                    <span class="EtiquetaInput">TELÉFONO</span>
                    <input type="tel" id="telefono" placeholder="TELÉFONO" required>
                </div>
            </div>

            <div class="GrupoInput">
                <span class="EtiquetaInput">PATENTE DEL VEHÍCULO</span>
                <input type="text" id="patente" placeholder="ABC123 Y AA111EE" required>
            </div>

            <div class="GrupoInput">
                <span class="EtiquetaInput">MAIL</span>
                <input type="email" id="email" placeholder="CORREO ELECTRÓNICO" style="text-transform: none;" required>
            </div>

            <div class="GrupoInput">
                <span class="EtiquetaInput">CONTRASEÑA DE ACCESO</span>
                <input type="password" id="password" placeholder="********" required>
            </div>

            <div class="GrupoInput">
                <span class="EtiquetaInput">DIRECCIÓN</span>
                <input type="text" id="direccion" placeholder="CALLE, NÚMERO, CIUDAD" required>
            </div>

            <button type="submit" class="BotonRegistrar">REGISTRATE</button>
        </form>

        <a href="../login.html" class="LinkVolver">VOLVER AL LOGIN</a>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const patente = document.getElementById('patente').value.trim().toUpperCase();
            
            // REGEX PARA FORMATO VIEJO (ABC123) O MERCOSUR (AA111EE) - SIN ESPACIOS
            const regexViejo = /^[A-Z]{3}\d{3}$/;
            const regexMercosur = /^[A-Z]{2}\d{3}[A-Z]{2}$/;

            if (!regexViejo.test(patente) && !regexMercosur.test(patente)) {
                alert('EL FORMATO DE LA PATENTE ES INVÁLIDO. USE: ABC123 Y AA111EE (SIN ESPACIOS)');
                return;
            }

            // SIMULAMOS EL REGISTRO EXITOSO SIN GUARDAR EN BD
            alert('REGISTRO SIMULADO EXITOSO. AHORA PUEDE INICIAR SESION.');
            window.location.href = '../login.html';
        });
    </script>

</body>
</html>
