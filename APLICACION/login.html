<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOPASS - LOGIN</title>
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body>

    <!-- PANTALLA INICIAL -->
    <div id="PantallaInicial">
        <img src="recursos/LOGOSINFONDO2-removebg-preview.png" alt="LOGO" class="LogoInicial">
        <img src="recursos/mapa.png" alt="MAPA" class="Mapa">
        <div class="ContenedorBotonInicial">
            <div class="ResplandorFondo"></div>
            <button class="BotonCircular" onclick="mostrarLogin()">
                <span class="EtiquetaBoton">INICIO</span>
            </button>
        </div>
    </div>

    <!-- PANTALLA DE LOGIN -->
    <div id="PantallaLogin">
        <img src="recursos/LOGOSINFONDO2-removebg-preview.png" alt="LOGO" class="LogoLogin">

        <div id="errorMsg" class="Error">POR FAVOR COMPLETE TODOS LOS CAMPOS</div>

        <form id="formLogin" class="FormularioLogin">
            <div class="GrupoInput">
                <span class="EtiquetaInput">USUARIO (EMAIL)</span>
                <input type="email" id="email" placeholder="INGRESE SU EMAIL" required style="text-transform: none;">
            </div>

            <div class="GrupoInput">
                <span class="EtiquetaInput">CONTRASENA</span>
                <input type="password" id="password" placeholder="********" required>
            </div>

            <button type="submit" class="BotonEntrar">ENTRAR</button>
        </form>

        <a href="vistas/registro.html" class="LinkRegistro">¿NO TENES CUENTA? REGISTRATE ACA</a>
    </div>

    <script>
        function mostrarLogin() {
            const pantallaInicial = document.getElementById('PantallaInicial');
            const pantallaLogin = document.getElementById('PantallaLogin');

            pantallaInicial.style.opacity = '0';
            pantallaInicial.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                pantallaInicial.style.display = 'none';
                pantallaLogin.classList.add('Visible');
            }, 800);
        }

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (email && password) {
                // SIMULAMOS EL LOGIN EXITOSO SIN GUARDAR EN BD
                localStorage.setItem('usuario_simulado', email);
                window.location.href = 'vistas/mapa.html';
            } else {
                errorMsg.innerText = 'POR FAVOR COMPLETE TODOS LOS CAMPOS';
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>
</html>
