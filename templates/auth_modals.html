    <!-- MODAL: LOGIN -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')"><i class="fas fa-xmark"></i></span>
            <h2>INICIÁ SESIÓN</h2>
            <div id="login-error" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="ejemplo@correo.com.ar" autofocus required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="********" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('login-password', this)" style="cursor: pointer; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666;"></i>
                    </div>
                </div>
                <div class="text-right mb-25">
                    <a href="javascript:void(0)" class="forgot-link" onclick="alert('Funcionalidad en desarrollo. Por favor, contactate con soporte.')">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
            </form>
            <div class="modal-text">
                ¿Todavía no tenés cuenta? <a href="javascript:void(0)" onclick="switchModal('loginModal', 'registerModal')" class="modal-link">Registrate acá</a>
            </div>
        </div>
    </div>

    <!-- MODAL: REGISTRO -->
    <div id="registerModal" class="modal">
        <div class="modal-content modal-content-wide">
            <span class="close-btn" onclick="closeModal('registerModal')"><i class="fas fa-xmark"></i></span>
            <h2>CREÁ TU CUENTA</h2>
            
            <div id="register-error" class="error-msg"></div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre/s</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="reg-nombre" placeholder="Tu nombre/s" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user-tag"></i>
                            <input type="text" id="reg-apellido" placeholder="Tu apellido" required>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>DNI</label>
                        <div class="input-with-icon">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="reg-dni" placeholder="12345678" maxlength="8" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <div class="input-with-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="reg-tel" placeholder="11 2233 4455" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="ejemplo@correo.com.ar" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Contraseña</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="reg-password" placeholder="Clave segura" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Contraseña</label>
                        <div class="input-with-icon">
                            <i class="fas fa-shield-halved"></i>
                            <input type="password" id="reg-password-confirm" placeholder="Repetí la clave" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password-confirm', this)"></i>
                        </div>
                    </div>
                </div>
                
                <div class="password-validation-area">
                    <div class="password-requirements">
                        <div id="reg-req-len" class="req-item"><i class="far fa-circle"></i> 8+ caracteres</div>
                        <div id="reg-req-up" class="req-item"><i class="far fa-circle"></i> Una mayúscula</div>
                        <div id="reg-req-spec" class="req-item"><i class="far fa-circle"></i> Un símbolo (!@#)</div>
                        <div id="reg-req-match" class="req-item"><i class="far fa-circle"></i> Coinciden</div>
                    </div>
                    <div class="strength-meter-container">
                        <div id="reg-password-strength" class="strength-meter"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-user-plus"></i> Finalizá tu Registro</button>
            </form>

            <div class="modal-text">
                ¿Ya tenés una cuenta? <a href="javascript:void(0)" onclick="switchModal('registerModal', 'loginModal')" class="modal-link">Iniciá sesión acá</a>
            </div>
        </div>
    </div>
