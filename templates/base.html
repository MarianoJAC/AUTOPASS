<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AUTOPASS - Estacionamiento Inteligente{% endblock %}</title>
    
    <!-- FUENTES E ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- ESTILOS BASE -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    
    <!-- LIBRERÍAS PRO (GRAFICOS, CALENDARIOS, QR) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="/static/css/footer.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    {% block content %}{% endblock %}

    <!-- SISTEMA DE NOTIFICACIONES Y MODALES GLOBALES -->
    <div id="modal-confirm" class="modal" style="display: none; z-index: 3000;">
        <div class="modal-content confirm-modal-content">
            <div class="confirm-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirm-title">¿Estás seguro?</h3>
            <p id="confirm-msg" class="modal-text">Esta acción no se puede deshacer.</p>
            <div class="confirm-actions">
                <button id="confirm-btn-cancel" class="btn btn-outline">CANCELAR</button>
                <button id="confirm-btn-ok" class="btn btn-primary">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- SCRIPTS BASE -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/api_client.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
