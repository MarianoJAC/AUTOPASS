<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLES DORADOS</title>
    <style>
        @property --angulo {
            syntax: '<angle>';
            initial-value: 220deg;
            inherits: false;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* DISPOSICION EN VERTICAL */
            justify-content: center;
            align-items: center;
            gap: 20px; /* ESPACIO REDUCIDO PARA QUE ENTRE TODO */
            height: 100vh;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .Logo {
            max-width: 576px; 
            height: auto;
            margin-bottom: -80px; /* BAJA UN 10% ADICIONAL (DE -50PX A -80PX) */
            z-index: 2; /* POR ENCIMA DEL MAPA */
        }

        .Mapa {
            max-width: 320px; 
            height: auto;
            opacity: 0.6;
            margin: 0;
            z-index: 1;
        }

        .ContenedorPrincipal {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -33px; /* BOTON A LA MITAD DEL BORDE INFERIOR DEL MAPA */
            z-index: 5;
        }

        .ResplandorFondo {
            position: absolute;
            width: 99px; /* AUMENTADO 10% (90 -> 99) */
            height: 99px;
            background: linear-gradient(135deg, rgba(225, 185, 65, 0.35) 0%, rgba(160, 120, 45, 0.2) 100%);
            border-radius: 50%;
            filter: blur(25px); /* UN POCO MAS DE BLUR PARA EL RESPLANDOR */
            z-index: 1;
        }

        .BotonCircular {
            position: relative;
            width: 66px; /* AUMENTADO 10% (60 -> 66) */
            height: 66px;
            border-radius: 50%;
            border: 3px solid transparent; 
            /* BRONCE MAS ILUMINADO */
            background: 
                linear-gradient(#0A0A0A, #0A0A0A) padding-box, 
                conic-gradient(from var(--angulo), #B35C32, #E0964F, #B35C32, #7D492D, #B35C32) border-box;

            color: #FFFFFF;
            font-size: 11px; 
            font-weight: bold;
            text-transform: capitalize; 
            cursor: pointer;
            outline: none;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease, --angulo 0.2s ease;
            box-shadow: 
                0 0 15px rgba(184, 115, 51, 0.45), /* SOMBRA MAS INTENSA */
                inset 0 0 8px rgba(184, 115, 51, 0.25),
                0 3px 12px rgba(0, 0, 0, 0.8);
        }

        .EtiquetaBoton {
            pointer-events: none;
            /* DEGRADADO COBRE VIBRANTE A BLANCO */
            background: linear-gradient(135deg, #B87333 0%, #FFFFFF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
        }

        .BotonCircular:active {
            transform: scale(0.94);
            animation: GirarLuz 3s ease-in-out infinite alternate;
            box-shadow: 
                0 0 12px rgba(197, 160, 46, 0.4),
                inset 0 0 25px rgba(0, 0, 0, 0.9);
        }

        @keyframes GirarLuz {
            from { --angulo: 185deg; }
            to { --angulo: 255deg; }
        }

        .BotonCircular:active .EtiquetaBoton {
            color: #888888;
        }
    </style>
</head>
<body>

    <img src="LOGOYNOMBRESINFONDO-removebg-preview.png" alt="LOGO" class="Logo">

    <img src="mapa.png" alt="MAPA" class="Mapa">

    <!-- BOTON ABRIR -->
    <div class="ContenedorPrincipal">
        <div class="ResplandorFondo"></div>
        <button class="BotonCircular">
            <span class="EtiquetaBoton">Open</span>
        </button>
    </div>

</body>
</html>
